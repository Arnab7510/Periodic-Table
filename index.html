<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Periodic Table</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        mat: {
                            bg: '#121212',
                            surface: '#1E1E1E',
                            surfaceHover: '#2D2D2D',
                            border: '#333333',
                            primary: '#90CAF9',
                            textPrimary: '#FFFFFF',
                            textSecondary: '#B3B3B3'
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            /* Custom scrollbar for the table wrapper */
            .custom-scrollbar::-webkit-scrollbar {
                @apply h-2;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                @apply bg-[#1E1E1E] rounded-full;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                @apply bg-[#424242] rounded-full hover:bg-[#616161] transition-colors;
            }
        }

        @layer components {
            .element {
                @apply relative flex flex-col items-center justify-center cursor-pointer rounded bg-mat-surface border border-mat-border aspect-[1/1.15] transition-all duration-200 select-none;
            }
            
            .element:hover {
                @apply scale-125 -translate-y-1 z-50 bg-mat-surfaceHover shadow-2xl border-white;
            }

            .element.selected {
                @apply border-mat-primary bg-[#90CAF9]/10 shadow-[0_0_15px_rgba(144,202,249,0.2)];
            }

            /* Category Colors mapped to borders and text */
            .alkali { @apply border-red-400/40 text-red-300; }
            .alkaline { @apply border-orange-400/40 text-orange-300; }
            .transition { @apply border-yellow-200/40 text-yellow-200; }
            .post-trans { @apply border-green-400/40 text-green-300; }
            .metalloid { @apply border-cyan-400/40 text-cyan-300; }
            .nonmetal { @apply border-blue-400/40 text-blue-300; }
            .noble { @apply border-purple-400/40 text-purple-300; }
            .lanthanide { @apply border-pink-400/40 text-pink-300; }
            .actinide { @apply border-indigo-400/40 text-indigo-300; }
        }

        /* Detail panel animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease forwards; }
    </style>
</head>
<body class="bg-mat-bg text-mat-textPrimary font-sans min-h-screen p-2 md:p-4 flex flex-col items-center overflow-x-hidden">

    <header class="w-full text-center mb-6 mt-4">
        <h1 class="text-3xl md:text-5xl font-bold tracking-tight text-white mb-4">Periodic Table</h1>
        <input 
            type="text" 
            id="search" 
            placeholder="Search element by name, symbol, or number..." 
            class="w-[95%] max-w-lg mx-auto block px-4 py-3 rounded-lg bg-mat-surface border border-mat-border text-white placeholder-mat-textSecondary focus:outline-none focus:border-mat-primary focus:ring-1 focus:ring-mat-primary transition-colors shadow-sm font-mono text-sm md:text-base"
        >
    </header>

    <div id="detail-panel" class="sticky top-2 md:top-4 z-[100] bg-mat-surface rounded-xl shadow-lg border border-mat-border w-[95%] max-w-4xl p-4 md:p-6 mb-8 flex flex-col md:flex-row gap-4 md:gap-8 items-center min-h-[120px]">
        
        <div id="msg" class="w-full text-center text-mat-textSecondary font-medium text-sm md:text-base">
            Select an element to view details
        </div>
        
        <div id="info" class="hidden w-full flex-col md:flex-row items-center gap-4 md:gap-8">
            <div class="flex items-center gap-4 min-w-max md:flex-col md:gap-1 text-center">
                <p id="big-symbol" class="text-4xl md:text-6xl font-bold text-mat-primary font-mono m-0"></p>
                <span id="el-name" class="font-medium text-lg md:text-sm uppercase tracking-wide text-white"></span>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-4 w-full">
                <div class="bg-mat-bg p-3 rounded-lg border border-mat-border flex flex-col">
                    <strong class="text-mat-primary text-xs uppercase tracking-wider mb-1">Atomic Number</strong> 
                    <span id="val-num" class="font-mono text-white text-sm md:text-base"></span>
                </div>
                <div class="bg-mat-bg p-3 rounded-lg border border-mat-border flex flex-col">
                    <strong class="text-mat-primary text-xs uppercase tracking-wider mb-1">Atomic Weight</strong> 
                    <span id="val-weight" class="font-mono text-white text-sm md:text-base"></span>
                </div>
                <div class="bg-mat-bg p-3 rounded-lg border border-mat-border flex flex-col">
                    <strong class="text-mat-primary text-xs uppercase tracking-wider mb-1">Category</strong> 
                    <span id="val-cat" class="font-mono text-white text-sm md:text-base capitalize"></span>
                </div>
                <div class="bg-mat-bg p-3 rounded-lg border border-mat-border flex flex-col">
                    <strong class="text-mat-primary text-xs uppercase tracking-wider mb-1">Electron Config</strong> 
                    <span id="val-orbital" class="font-mono text-white text-sm md:text-base break-all"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="w-full max-w-[100vw] overflow-x-auto pb-8 custom-scrollbar block">
        <main id="periodic-table" class="grid grid-cols-[repeat(18,1fr)] grid-rows-[repeat(10,1fr)] gap-1 md:gap-1.5 min-w-[900px] w-max mx-auto px-4 relative"></main>
    </div>

            {n:117,s:'Ts',name:'Tennessine',w:'294',cat:'metalloid',c:17,r:7,o:'[Rn] 5f¹⁴ 6d¹⁰ 7s² 7p⁵'},
            {n:118,s:'Og',name:'Oganesson',w:'294',cat:'noble',c:18,r:7,o:'[Rn] 5f¹⁴ 6d¹⁰ 7s² 7p⁶'}
        ];

        const grid = document.getElementById('periodic-table');
        const info = document.getElementById('info');
        const msg = document.getElementById('msg');

        function render(filter = "") {
            grid.innerHTML = "";
            elements.forEach(el => {
                if (filter && !el.name.toLowerCase().includes(filter) && !el.s.toLowerCase().includes(filter) && !String(el.n).includes(filter)) return;

                const div = document.createElement('div');
                div.className = `element ${el.cat}`;
                
                // Set explicit grid placements using inline styles so Tailwind's JIT CDN doesn't miss them
                div.style.gridColumn = el.c;
                div.style.gridRow = el.r;
                
                div.innerHTML = `
                    <span class="absolute top-[2px] left-[4px] text-[0.6rem] font-mono text-mat-textSecondary leading-none">${el.n}</span>
                    <span class="text-lg md:text-xl font-bold text-white relative z-10 leading-none">${el.s}</span>
                    <span class="text-[0.5rem] md:text-[0.55rem] text-mat-textSecondary text-center uppercase tracking-wide w-[90%] truncate mt-[2px]">${el.name}</span>
                `;

                const update = () => {
                    msg.classList.add('hidden');
                    info.classList.remove('hidden');
                    info.classList.add('flex');
                    
                    // Restart animation
                    info.classList.remove('animate-fade-in');
                    void info.offsetWidth; 
                    info.classList.add('animate-fade-in');

                    document.getElementById('el-name').innerText = el.name;
                    document.getElementById('big-symbol').innerText = el.s;
                    document.getElementById('val-num').innerText = el.n;
                    document.getElementById('val-weight').innerText = el.w;
                    document.getElementById('val-cat').innerText = el.cat.replace('-', ' ');
                    document.getElementById('val-orbital').innerText = el.o;
                    
                    document.querySelectorAll('.element').forEach(e => e.classList.remove('selected'));
                    div.classList.add('selected');
                };

                div.onmouseover = update;
                div.onclick = update;
                grid.appendChild(div);
            });
        }

        document.getElementById('search').oninput = (e) => render(e.target.value.toLowerCase());
        render();
    </script>
</body>
</html>
